<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>报价管理系统</title>
<link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.bootcdn.net/ajax/libs/bootstrap-icons/1.11.2/font/bootstrap-icons.css" rel="stylesheet">
<script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
<style>
:root {
  --primary: #4f46e5;
  --primary-dark: #3730a3;
  --primary-light: #e0e7ff;
  --success: #059669;
  --danger: #dc2626;
  --warning: #d97706;
  --gray-50: #f8fafc;
  --gray-100: #f1f5f9;
  --gray-200: #e2e8f0;
  --gray-300: #cbd5e1;
  --gray-400: #94a3b8;
  --gray-500: #64748b;
  --gray-600: #475569;
  --gray-700: #334155;
  --gray-800: #1e293b;
  --gray-900: #0f172a;
  --sidebar-width: 240px;
}

* { box-sizing: border-box; }

body {
  background: var(--gray-50);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", Roboto, sans-serif;
  color: var(--gray-800);
  overflow-x: hidden;
}

/* ── Sidebar ── */
.sidebar {
  position: fixed; top: 0; left: 0; bottom: 0; width: var(--sidebar-width);
  background: linear-gradient(180deg, #1e1b4b 0%, #312e81 40%, #3730a3 100%);
  z-index: 1040;
  transition: transform .3s ease;
  display: flex; flex-direction: column;
  box-shadow: 2px 0 20px rgba(0,0,0,.08);
}
.sidebar-logo {
  padding: 1.2rem 1.25rem;
  border-bottom: 1px solid rgba(255,255,255,.08);
}
.sidebar-logo h5 {
  color: #fff; font-weight: 700; font-size: 1.1rem;
  margin: 0;
}
.sidebar-logo small {
  color: rgba(255,255,255,.5); font-size: .7rem;
}
.sidebar-nav {
  flex: 1; overflow-y: auto; padding: .5rem;
}
.sidebar-nav .nav-link {
  display: flex; align-items: center; gap: .6rem;
  color: rgba(255,255,255,.65);
  padding: .55rem .85rem;
  margin: 2px 0;
  border-radius: 8px;
  transition: all .2s;
  font-size: .88rem;
  text-decoration: none;
  cursor: pointer;
}
.sidebar-nav .nav-link:hover {
  color: #fff;
  background: rgba(255,255,255,.1);
}
.sidebar-nav .nav-link.active {
  color: #fff;
  background: rgba(255,255,255,.15);
  box-shadow: 0 0 0 1px rgba(255,255,255,.08);
}
.sidebar-nav .nav-link i {
  width: 18px; text-align: center;
  font-size: 1rem;
}
.sidebar-nav .nav-link .badge {
  margin-left: auto; font-size: .7rem;
  background: rgba(255,255,255,.15); color: #fff;
  font-weight: 500;
}

/* ── Sidebar Collapse ── */
.sidebar-collapse-btn {
  position: absolute;
  top: .7rem; right: .7rem;
  color: rgba(255,255,255,.5);
  background: none; border: none;
  font-size: 1rem; cursor: pointer;
  padding: 4px 6px; border-radius: 6px;
  transition: all .2s;
  z-index: 1;
}
.sidebar-collapse-btn:hover { color: #fff; background: rgba(255,255,255,.1); }
.sidebar.collapsed {
  width: 60px !important;
}
.sidebar.collapsed .sidebar-logo {
  padding: .8rem .5rem;
  text-align: center;
}
.sidebar.collapsed .sidebar-logo h5 { font-size: 0; }
.sidebar.collapsed .sidebar-logo h5 i { font-size: 1.2rem; }
.sidebar.collapsed .sidebar-logo small { display: none; }
.sidebar.collapsed .sidebar-nav .nav-link {
  justify-content: center;
  padding: .55rem;
  font-size: 0;
}
.sidebar.collapsed .sidebar-nav .nav-link i { font-size: 1.1rem; margin: 0; }
.sidebar.collapsed .sidebar-nav .nav-link .badge { display: none; }
.sidebar.collapsed hr { display: none; }
.main-wrapper.expanded { margin-left: 60px; }
.main-wrapper {
  margin-left: var(--sidebar-width);
  min-height: 100vh;
  transition: margin-left .3s ease;
}
.topbar {
  background: #fff;
  border-bottom: 1px solid var(--gray-200);
  padding: .65rem 1.5rem;
  position: sticky; top: 0; z-index: 1030;
  display: flex; align-items: center;
}
.topbar-title { font-weight: 600; font-size: 1rem; color: var(--gray-800); }
.main-content { padding: 1.5rem; }

/* ── Cards ── */
.card-modern {
  background: #fff;
  border: 1px solid var(--gray-200);
  border-radius: 12px;
  padding: 1.25rem;
  margin-bottom: 1rem;
  transition: box-shadow .2s;
}
.card-modern:hover {
  box-shadow: 0 4px 12px rgba(0,0,0,.04);
}
.card-title-modern {
  font-size: .9rem;
  font-weight: 600;
  color: var(--gray-700);
  margin-bottom: .9rem;
  display: flex;
  align-items: center;
  gap: .5rem;
}

/* ── Stat Cards ── */
.stat-card {
  background: #fff;
  border: 1px solid var(--gray-200);
  border-radius: 12px;
  padding: 1.25rem;
  transition: transform .15s, box-shadow .15s;
}
.stat-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 16px rgba(0,0,0,.06);
}
.stat-icon {
  width: 44px; height: 44px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.3rem;
  flex-shrink: 0;
}

/* ── Table ── */
.table-modern { margin-bottom: 0; }
.table-modern > :not(caption) > * > * {
  vertical-align: middle;
  padding: .6rem .5rem;
  border-bottom: 1px solid var(--gray-100);
}
.table-modern > thead > tr > * {
  background: var(--gray-50);
  font-size: .78rem;
  font-weight: 600;
  color: var(--gray-500);
  text-transform: uppercase;
  letter-spacing: .03em;
  border-bottom: 1px solid var(--gray-200);
}
.table-modern > tbody > tr:hover {
  background: var(--gray-50);
}

/* ── Search ── */
.search-box {
  background: var(--gray-100);
  border: 1px solid var(--gray-200);
  border-radius: 8px;
  padding: .4rem .75rem;
  transition: all .2s;
}
.search-box:focus {
  background: #fff;
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(79,70,229,.1);
}

/* ── Buttons ── */
.btn-modern {
  border-radius: 8px;
  font-weight: 500;
  padding: .4rem .9rem;
  font-size: .85rem;
  transition: all .15s;
}
.btn-sm-icon { padding: .25rem .5rem; }

/* ── Pagination ── */
.pagination-modern .page-link {
  border: none;
  border-radius: 6px !important;
  margin: 0 2px;
  font-size: .82rem;
  color: var(--gray-600);
  padding: .3rem .65rem;
  background: transparent;
}
.pagination-modern .page-link:hover {
  background: var(--gray-100);
}
.pagination-modern .page-item.active .page-link {
  background: var(--primary);
  color: #fff;
}

/* ── Sidebar Overlay ── */
.sidebar-overlay {
  display: none;
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,.4);
  z-index: 1035;
}

/* ── Toast ── */
.toast-container { z-index: 9999; }

/* ── Animations ── */
@keyframes fadeSlideUp {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.anim-in { animation: fadeSlideUp .25s ease both; }

/* ── Empty State ── */
.empty-state {
  text-align: center; padding: 2.5rem 1rem;
  color: var(--gray-400);
}
.empty-state i { font-size: 2.5rem; margin-bottom: .8rem; }

/* ── Misc ── */
.amount-total { font-size: 1rem; font-weight: 600; color: var(--danger); }
.picker-item:hover { background: var(--primary-light); }
.search-results {
  position: absolute; z-index: 100;
  background: #fff; border: 1px solid var(--gray-200);
  border-radius: 8px; margin-top: 4px;
  max-height: 300px; overflow-y: auto;
  box-shadow: 0 8px 24px rgba(0,0,0,.1);
}

/* ── Responsive ── */
@media (max-width: 991.98px) {
  .sidebar { transform: translateX(-100%); }
  .sidebar.open { transform: translateX(0); }
  .sidebar-overlay.show { display: block; }
  .main-wrapper { margin-left: 0; }
  .main-content { padding: 1rem; }
}
@media (min-width: 992px) {
  .sidebar-toggle { display: none !important; }
}

/* ── Form Tweaks ── */
.form-control:focus, .form-select:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(79,70,229,.1);
}
.modern-modal .modal-content {
  border: none;
  border-radius: 14px;
  box-shadow: 0 20px 60px rgba(0,0,0,.15);
  overflow: hidden;
}
.modern-modal .modal-dialog {
  max-width: 60vw !important;
  min-width: 360px;
}

/* ── 即时悬浮 tooltip ── */
.tip-cell {
  position: relative;
  cursor: default;
}
.tip-pop {
  display: none;
  position: fixed;
  background: #1e293b;
  color: #fff;
  padding: 8px 12px;
  border-radius: 8px;
  font-size: .78rem;
  line-height: 1.5;
  white-space: pre-line;
  z-index: 9999;
  min-width: 200px;
  max-width: 360px;
  pointer-events: none;
  box-shadow: 0 4px 16px rgba(0,0,0,.25);
}
.tip-pop.show {
  display: block;
}
.autocomplete-wrap { position: relative; }
.autocomplete-dropdown {
  display: none;
  position: absolute;
  top: 100%; left: 0; right: 0;
  max-height: 180px;
  overflow-y: auto;
  background: #fff;
  border: 1px solid var(--gray-200);
  border-radius: 0 0 8px 8px;
  box-shadow: 0 4px 12px rgba(0,0,0,.1);
  z-index: 1050;
}
.autocomplete-dropdown.show { display: block; }
.autocomplete-dropdown .ac-item {
  padding: 6px 12px;
  cursor: pointer;
  font-size: .85rem;
  color: #333;
}
.autocomplete-dropdown .ac-item:hover,
.autocomplete-dropdown .ac-item.active {
  background: var(--primary-light);
  color: var(--primary);
}
.modern-modal .modal-header {
  border-bottom: 1px solid var(--gray-100);
  padding: 1rem 1.25rem;
}
.modern-modal .modal-body { padding: 1.25rem; }
.modern-modal .modal-footer {
  border-top: 1px solid var(--gray-100);
  padding: .75rem 1.25rem;
}

/* per-page selector */
.per-page-select {
  width: auto;
  display: inline-block;
  font-size: .82rem;
  padding: .2rem .5rem;
  border-radius: 6px;
  border: 1px solid var(--gray-200);
  background: #fff;
  color: var(--gray-600);
}
</style>
</head>
<body>

<!-- Toast -->
<div class="toast-container position-fixed bottom-0 end-0 p-3">
  <div id="liveToast" class="toast border-0 shadow" role="alert">
    <div class="toast-header bg-light bg-opacity-75">
      <i class="bi bi-check-circle-fill text-success me-2"></i>
      <strong class="me-auto">提示</strong>
      <button type="button" class="btn-close" data-bs-dismiss="toast"></button>
    </div>
    <div class="toast-body" id="toastBody"></div>
  </div>
</div>

<!-- Sidebar Overlay (mobile) -->
<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

<!-- Sidebar -->
<div class="sidebar" id="sidebar">
  <div class="sidebar-logo" style="position:relative">
    <h5><i class="bi bi-file-text me-2"></i>报价系统</h5>
    <small>硬件报价管理平台</small>
    <button class="sidebar-collapse-btn d-none d-lg-block" onclick="toggleCollapse()" title="收起菜单"><i class="bi bi-chevron-left"></i></button>
  </div>
  <div class="sidebar-nav">
    <a class="nav-link active" onclick="switchTab('dashboard')">
      <i class="bi bi-speedometer2"></i> 概览
    </a>
    <a class="nav-link" onclick="switchTab('products')">
      <i class="bi bi-box-seam"></i> 产品管理
    </a>
    <a class="nav-link" onclick="switchTab('quotes')">
      <i class="bi bi-file-earmark-text"></i> 报价单
    </a>
    <a class="nav-link" onclick="switchTab('newquote')">
      <i class="bi bi-plus-circle"></i> 新建报价
      <span class="badge">+</span>
    </a>
    <a class="nav-link" onclick="switchTab('import')">
      <i class="bi bi-upload"></i> 导入产品
    </a>
    <hr style="border-color: rgba(255,255,255,.08); margin: .5rem 0;">
    <a class="nav-link" style="opacity:.6; font-size:.8rem; cursor:default">
      <i class="bi bi-info-circle"></i> <span id="versionDisplay">v—</span>
    </a>
  </div>
</div>

<!-- Main Wrapper -->
<div class="main-wrapper" id="mainWrapper">
  <div class="topbar">
    <button class="btn btn-link sidebar-toggle text-dark me-2 p-0" onclick="toggleSidebar()" style="font-size:1.2rem;text-decoration:none">
      <i class="bi bi-list"></i>
    </button>
    <span class="topbar-title" id="topbarTitle">概览</span>
  </div>
  <div class="main-content" id="mainContent">
    <!-- Pages rendered by JS -->
  </div>
</div>

<!-- Modal -->
<div class="modal fade modern-modal" id="formModal" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title fw-semibold" id="formModalTitle"></h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="formModalBody"></div>
      <div class="modal-footer" id="formModalFooter"></div>
    </div>
  </div>
</div>

<script>
// ─── State ──────────────────────────────────────────────
const BASE_URL = location.pathname.replace(/\/[^\/]*$/, '') || '';
let currentTab = 'dashboard';
let products = [], categories = [], suppliers = [];
let currentPage = 1, totalProducts = 0, perPage = 20;
let searchTerm = '', categoryFilter = '', supplierFilter = '';
let selectedIds = new Set();
let quoteItems = [];
let editingQuoteId = null;
let productIndex = {};
// ─── Cache (instant tab switch) ──────────────────────────
let dashboardCache = null;  // { prodCount, quotes, totalAmount, downloadTotal, catCount }
let productsCache = null;   // { products, categories, suppliers, total, page, perPage, search, category, supplier }
function clearCaches() { dashboardCache = null; productsCache = null; }

// ─── Tools ──────────────────────────────────────────────
function toast(msg, type='success') {
  const t = document.getElementById('liveToast');
  const icon = document.querySelector('#liveToast .toast-header i');
  icon.className = type==='success' ? 'bi bi-check-circle-fill text-success me-2' :
                   type==='warning' ? 'bi bi-exclamation-triangle-fill text-warning me-2' :
                   'bi bi-x-circle-fill text-danger me-2';
  document.getElementById('toastBody').textContent = msg;
  bootstrap.Toast.getOrCreateInstance(t).show();
}

function $(id) { return document.getElementById(id); }

async function api(url, method='GET', body=null) {
  const opts = { method, headers: {'Content-Type':'application/json','Accept':'application/json'} };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(BASE_URL + url, opts);
  return r.json();
}

function formatMoney(v) { return '¥' + Number(v || 0).toLocaleString('zh-CN', {minimumFractionDigits:2, maximumFractionDigits:2}); }
function escHtml(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('show');
}
function closeSidebar() {
  if (window.innerWidth < 992) {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebarOverlay').classList.remove('show');
  }
}

function toggleCollapse() {
  const sb = document.getElementById('sidebar');
  const mw = document.getElementById('mainWrapper');
  const btn = sb.querySelector('.sidebar-collapse-btn i');
  sb.classList.toggle('collapsed');
  mw.classList.toggle('expanded');
  btn.className = sb.classList.contains('collapsed') ? 'bi bi-chevron-right' : 'bi bi-chevron-left';
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.sidebar-nav .nav-link').forEach(a => {
    a.classList.remove('active');
    if (a.getAttribute('onclick')?.includes(`'${tab}'`)) a.classList.add('active');
  });
  const titles = {dashboard:'概览', products:'产品管理', quotes:'报价单', newquote:'新建报价单', import:'导入产品'};
  $('topbarTitle').textContent = titles[tab] || tab;
  closeSidebar();
  renderPage();
}

function renderPage() {
  const el = $('mainContent');
  if (currentTab === 'dashboard') renderDashboard(el);
  else if (currentTab === 'products') renderProducts(el);
  else if (currentTab === 'quotes') renderQuotes(el);
  else if (currentTab === 'newquote') renderNewQuote(el);
  else if (currentTab === 'import') renderImport(el);
  else el.innerHTML = '<div class="card-modern"><h5>页面建设中</h5></div>';
}

// ─── Dashboard ──────────────────────────────────────────
async function prefetchDashboard() {
  try {
    const [p, q] = await Promise.all([
      api('/api/products?per_page=1'),
      api('/api/quotes')
    ]);
    const quotes = q.quotes || [];
    dashboardCache = {
      prodCount: p.total || 0,
      quotes: quotes,
      totalAmount: quotes.reduce((s, qq) => s + (qq.total_amount || 0), 0),
      downloadTotal: quotes.reduce((s, qq) => s + (qq.download_count || 0), 0),
      catCount: p.categories?.length || 0,
    };
  } catch(e) { dashboardCache = null; }
}

function renderDashboardHTML(data) {
  const { prodCount, quotes, totalAmount, downloadTotal, catCount } = data;
  return `
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h5 class="fw-bold mb-0">系统概览</h5>
    </div>
    <div class="row g-3 mb-4 anim-in">
      <div class="col-6 col-md-3">
        <div class="stat-card">
          <div class="d-flex align-items-center gap-3">
            <div class="stat-icon" style="background:${catCount > 0 ? 'var(--primary-light)' : '#f1f5f9'};color:var(--primary)">
              <i class="bi bi-box-seam"></i>
            </div>
            <div>
              <div class="text-muted" style="font-size:.72rem">产品总数</div>
              <div class="fw-bold fs-4">${prodCount}</div>
            </div>
          </div>
          <div class="mt-2 small text-muted">${catCount} 个分类</div>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="stat-card">
          <div class="d-flex align-items-center gap-3">
            <div class="stat-icon" style="background:#d1fae5;color:var(--success)">
              <i class="bi bi-file-earmark-text"></i>
            </div>
            <div>
              <div class="text-muted" style="font-size:.72rem">报价单</div>
              <div class="fw-bold fs-4">${quotes.length}</div>
            </div>
          </div>
          <div class="mt-2 small text-muted">共 ${formatMoney(totalAmount)}</div>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="stat-card">
          <div class="d-flex align-items-center gap-3">
            <div class="stat-icon" style="background:#fef3c7;color:var(--warning)">
              <i class="bi bi-download"></i>
            </div>
            <div>
              <div class="text-muted" style="font-size:.72rem">下载</div>
              <div class="fw-bold fs-4">${downloadTotal}</div>
            </div>
          </div>
        </div>
      </div>
      <div class="col-6 col-md-3">
        <div class="stat-card">
          <div class="d-flex align-items-center gap-3">
            <div class="stat-icon" style="background:#fee2e2;color:var(--danger)">
              <i class="bi bi-currency-yen"></i>
            </div>
            <div>
              <div class="text-muted" style="font-size:.72rem">总金额</div>
              <div class="fw-bold fs-4" style="color:var(--danger)">${formatMoney(totalAmount)}</div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="row g-3">
      <div class="col-md-6">
        <div class="card-modern anim-in">
          <div class="card-title-modern"><i class="bi bi-clock-history text-primary"></i>最近报价</div>
          ${quotes.length ? quotes.slice(0, 10).map(qq => `
            <div class="d-flex justify-content-between align-items-center py-2" style="border-bottom:1px solid var(--gray-100);cursor:pointer" onclick="viewQuote(${qq.id})" title="点击查看预览">
              <span><i class="bi bi-file-text me-2 text-muted"></i>${escHtml(qq.title || '未命名')}</span>
              <span class="text-muted small fw-medium">${formatMoney(qq.total_amount)}</span>
            </div>
          `).join('') : '<div class="text-muted text-center py-3 small">暂无报价单</div>'}
        </div>
      </div>
      <div class="col-md-6">
        <div class="card-modern anim-in">
          <div class="card-title-modern"><i class="bi bi-lightning text-primary"></i>快速操作</div>
          <div class="d-grid gap-2">
            <button class="btn btn-outline-primary text-start btn-modern" onclick="switchTab('import')"><i class="bi bi-upload me-2"></i>从Excel导入产品（支持多Sheet）</button>
            <button class="btn btn-outline-primary text-start btn-modern" onclick="switchTab('newquote')"><i class="bi bi-plus-circle me-2"></i>新建报价单</button>
            <button class="btn btn-outline-primary text-start btn-modern" onclick="switchTab('products')"><i class="bi bi-box-seam me-2"></i>管理产品库</button>
          </div>
        </div>
      </div>
    </div>
  `;
}

async function renderDashboard(el) {
  if (dashboardCache) {
    // Instant render from cache
    el.innerHTML = renderDashboardHTML(dashboardCache);
    // Silent background refresh — only re-render if data changed
    const snap = JSON.stringify(dashboardCache);
    prefetchDashboard().then(() => {
      if (currentTab === 'dashboard' && JSON.stringify(dashboardCache) !== snap) {
        el.innerHTML = renderDashboardHTML(dashboardCache);
      }
    });
  } else {
    el.innerHTML = '<div class="text-center py-5"><div class="spinner-border text-primary mb-2" role="status"></div><p class="text-muted small">加载概览...</p></div>';
    await prefetchDashboard();
    if (dashboardCache) el.innerHTML = renderDashboardHTML(dashboardCache);
  }
}

// ─── Products ───────────────────────────────────────────
async function prefetchProducts() {
  const key = `${currentPage}|${perPage}|${searchTerm}|${categoryFilter}|${supplierFilter}`;
  try {
    const data = await api(`/api/products?page=${currentPage}&per_page=${perPage}&search=${encodeURIComponent(searchTerm)}&category=${encodeURIComponent(categoryFilter)}&supplier=${encodeURIComponent(supplierFilter)}`);
    productsCache = {
      data, key,
      products: data.products || [],
      categories: data.categories || [],
      suppliers: data.suppliers || [],
      total: data.total || 0,
    };
  } catch(e) { productsCache = null; }
}

function productsCacheValid() {
  if (!productsCache) return false;
  const key = `${currentPage}|${perPage}|${searchTerm}|${categoryFilter}|${supplierFilter}`;
  return productsCache.key === key;
}

  const rows = products.map(p => `

async function renderProducts(el) {
  if (productsCacheValid()) {
    // Instant render from cache
    products = productsCache.products;
    categories = productsCache.categories;
    suppliers = productsCache.suppliers;
    el.innerHTML = renderProductsHTML(productsCache);
    // Silent background refresh — only re-render if data changed
    const snapData = JSON.stringify(productsCache.products);
    const snapTotal = productsCache.total;
    prefetchProducts().then(() => {
      if (currentTab === 'products' && productsCacheValid()) {
        if (JSON.stringify(productsCache.products) !== snapData || productsCache.total !== snapTotal) {
          products = productsCache.products;
          categories = productsCache.categories;
          suppliers = productsCache.suppliers;
          el.innerHTML = renderProductsHTML(productsCache);
        }
      }
    });
  } else {
    el.innerHTML = '<div class="text-center py-5"><div class="spinner-border text-primary mb-2" role="status"></div><p class="text-muted small">加载产品数据...</p></div>';
    await prefetchProducts();
    if (productsCache) {
      products = productsCache.products;
      categories = productsCache.categories;
      suppliers = productsCache.suppliers;
      el.innerHTML = renderProductsHTML(productsCache);
    }
  }
}

function toggleAll(checked) {
  products.forEach(p => { if (checked) selectedIds.add(p.id); else selectedIds.delete(p.id); });
  renderProducts($('mainContent'));
}
function toggleSelect(id) { selectedIds.has(id) ? selectedIds.delete(id) : selectedIds.add(id); renderProducts($('mainContent')); }
function searchDelay(v) { clearTimeout(window._st); window._st = setTimeout(() => { searchTerm = v; currentPage = 1; renderProducts($('mainContent')); }, 300); }
function goPage(p) { currentPage = p; renderProducts($('mainContent')); }

// ── 厂商联想 ──
function filterSuppliers(val) {
  const dd = $('pf_supplier_dd');
  if (!dd) return;
  const q = (val || '').toLowerCase();
  const matches = suppliers.filter(s => s.toLowerCase().includes(q)).slice(0, 8);
  if (!matches.length || !q) {
    dd.classList.remove('show');
    dd.innerHTML = '';
    return;
  }
  dd.innerHTML = matches.map((s, i) =>
    `<div class="ac-item" data-idx="${i}" onmousedown="selectSupplier('${escHtml(s)}')">${highlight(s, q)}</div>`
  ).join('');
  dd.classList.add('show');
  window._supplierIdx = -1;
}

function highlight(text, query) {
  const idx = text.toLowerCase().indexOf(query.toLowerCase());
  if (idx < 0) return escHtml(text);
  return escHtml(text.slice(0, idx)) + '<strong>' + escHtml(text.slice(idx, idx + query.length)) + '</strong>' + escHtml(text.slice(idx + query.length));
}

function hideSupplierDropdown() {
  const dd = $('pf_supplier_dd');
  if (dd) dd.classList.remove('show');
}

function selectSupplier(val) {
  const input = $('pf_supplier');
  if (input) input.value = val;
  hideSupplierDropdown();
}

// 键盘导航
document.addEventListener('keydown', e => {
  const input = $('pf_supplier');
  const dd = $('pf_supplier_dd');
  if (!input || document.activeElement !== input || !dd || !dd.classList.contains('show')) return;
  const items = dd.querySelectorAll('.ac-item');
  if (!items.length) return;
  if (e.key === 'ArrowDown') {
    e.preventDefault();
    window._supplierIdx = Math.min((window._supplierIdx || -1) + 1, items.length - 1);
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    window._supplierIdx = Math.max((window._supplierIdx || 0) - 1, -1);
  } else if (e.key === 'Enter' && window._supplierIdx >= 0) {
    e.preventDefault();
    input.value = items[window._supplierIdx].textContent;
    hideSupplierDropdown();
    return;
  } else { return; }
  items.forEach((el, i) => el.classList.toggle('active', i === window._supplierIdx));
});

// ── 图片上传 ──
async function uploadImageFile(input) {
  const file = input.files[0];
  if (!file) return;
  if (file.size > 10 * 1024 * 1024) { toast('图片不能超过10MB', 'warning'); return; }
  const formData = new FormData();
  formData.append('file', file);
  try {
    const r = await fetch(BASE_URL + '/api/upload/image', { method: 'POST', body: formData });
    const data = await r.json();
    if (data.url) {
      window._pfImageUrl = data.url;
      showImagePreview(BASE_URL + data.url);
      $('pf_image_url').value = data.url;
      toast('图片已上传');
    } else {
      toast(data.error || '上传失败', 'warning');
    }
  } catch(e) { toast('上传失败: ' + e.message, 'warning'); }
}

function handleImagePaste(event) {
  const items = (event.clipboardData || window.clipboardData).items;
  for (const item of items) {
    if (item.type.startsWith('image/')) {
      event.preventDefault();
      const file = item.getAsFile();
      if (file) {
        const formData = new FormData();
        formData.append('file', file, 'pasted_image.png');
        fetch(BASE_URL + '/api/upload/image', { method: 'POST', body: formData })
          .then(r => r.json()).then(data => {
            if (data.url) { window._pfImageUrl = data.url; showImagePreview(BASE_URL + data.url); $('pf_image_url').value = data.url; toast('图片已粘贴'); }
          });
      }
      break;
    }
  }
}

// ── 智能识别 ──
let recognizedResults = [];

async function recognizePastedText() {
  const text = $('pf_paste_zone')?.value?.trim();
  if (!text) { toast('请先粘贴要识别的内容', 'warning'); return; }
  const rd = $('pf_recognize_results');
  if (!rd) return;
  rd.innerHTML = '<div class="text-center py-2"><div class="spinner-border spinner-border-sm text-primary" role="status"></div> 识别中...</div>';
  try {
    const res = await api('/api/products/recognize', 'POST', {text});
    recognizedResults = res.products || [];
    if (!recognizedResults.length) { rd.innerHTML = `<div class="alert alert-warning py-2 mb-0 small">${res.error || '未能识别出产品信息'}</div>`; return; }
    rd.innerHTML = `<div class="p-2 rounded" style="background:var(--gray-50);border:1px solid var(--gray-200)">` +
      `<div class="small fw-medium mb-1 text-success"><i class="bi bi-check-circle"></i> 识别到 ${recognizedResults.length} 个产品，点击填入</div>` +
      recognizedResults.map((p, i) =>
        `<div class="d-flex align-items-center justify-content-between py-1" style="cursor:pointer;border-bottom:1px solid var(--gray-100)" onclick="fillProductFromResult(${i})">
          <span><strong style="font-size:.83rem">${escHtml(p.name)}</strong>${p.spec ? ` <code class="small">${escHtml(p.spec)}</code>` : ''}</span>
          <span class="text-primary small">${p.price ? '¥' + p.price : ''} <i class="bi bi-arrow-right"></i></span>
        </div>`
      ).join('') + `</div>`;
    toast(`识别到 ${recognizedResults.length} 个产品`);
  } catch(e) { rd.innerHTML = `<div class="alert alert-danger py-2 mb-0 small">识别失败: ${e.message}</div>`; }
}

function fillProductFromResult(index) {
  const p = recognizedResults[index];
  if (!p) return;
  if ($('pf_name') && p.name) $('pf_name').value = p.name;
  if ($('pf_spec') && (p.sku || p.spec)) $('pf_spec').value = p.sku || p.spec;
  if ($('pf_supplier') && p.supplier) $('pf_supplier').value = p.supplier;
  if ($('pf_unit') && p.unit) $('pf_unit').value = p.unit;
  if ($('pf_price') && p.price) $('pf_price').value = p.price;
  if ($('pf_function_desc') && (p.remark || p.function_desc)) $('pf_function_desc').value = p.remark || p.function_desc;
  toast(`已填入「${p.name}」`);
}

async function recognizePastedImage() {
  try {
    const clipboardItems = await navigator.clipboard.read();
    let imageFile = null;
    for (const item of clipboardItems) {
      for (const type of item.types) {
        if (type.startsWith('image/')) {
          const blob = await item.getType(type);
          imageFile = new File([blob], 'clipboard_image.png', {type});
          break;
        }
      }
      if (imageFile) break;
    }
    if (!imageFile) {
      toast('剪贴板中没有图片，请先截图到剪贴板', 'warning');
      return;
    }
    const formData = new FormData();
    formData.append('file', imageFile);
    const rd = $('pf_recognize_results');
    if (rd) rd.innerHTML = '<div class="text-center py-2"><div class="spinner-border spinner-border-sm text-primary" role="status"></div> OCR识别中...</div>';
    const r = await fetch(BASE_URL + '/api/products/ocr', { method: 'POST', body: formData });
    const data = await r.json();
    if (data.text) {
      if ($('pf_paste_zone')) $('pf_paste_zone').value = data.text;
      toast('OCR识别完成，正在分析');
      recognizePastedText();
    } else {
      if (rd) rd.innerHTML = `<div class="alert alert-warning py-2 mb-0 small">${data.error || 'OCR未能识别出文字'}</div>`;
    }
  } catch(e) {
    if (e.name === 'NotAllowedError') {
      toast('请在浏览器设置中允许剪贴板权限', 'warning');
    } else {
      const input = document.createElement('input');
      input.type = 'file'; input.accept = 'image/*';
      input.onchange = async (ev) => {
        const file = ev.target.files[0]; if (!file) return;
        const fd = new FormData(); fd.append('file', file);
        const rd = $('pf_recognize_results');
        if (rd) rd.innerHTML = '<div class="text-center py-2"><div class="spinner-border spinner-border-sm text-primary" role="status"></div> OCR识别中...</div>';
        const r = await fetch(BASE_URL + '/api/products/ocr', { method: 'POST', body: fd });
        const d = await r.json();
        if (d.text) { if ($('pf_paste_zone')) $('pf_paste_zone').value = d.text; toast('OCR完成'); recognizePastedText(); }
      };
      input.click();
    }
  }
}

let quotesPerPage = 10;

async function renderQuotes(el) {
  const data = await api('/api/quotes');
  let quotes = data.quotes || [];
  quotes.sort((a, b) => b.id - a.id);
  const total = quotes.length;
  const totalPages = Math.ceil(total / quotesPerPage);
  const start = (currentPage - 1) * quotesPerPage;
  const pageQuotes = quotes.slice(start, start + quotesPerPage);

  function qPagination() {
    if (totalPages <= 1) return '';
    return `
      <nav class="mt-3"><ul class="pagination pagination-modern justify-content-center mb-0" style="flex-wrap:wrap">
        <li class="page-item ${currentPage <= 1 ? 'disabled' : ''}"><a class="page-link" onclick="quotesPage(${currentPage-1})">上一页</a></li>
        ${Array.from({length: Math.min(totalPages, 7)}, (_, i) => {
          let p = i + 1;
          if (totalPages > 7 && currentPage > 4) p = currentPage - 4 + i;
          if (p > totalPages) return '';
          return `<li class="page-item ${p === currentPage ? 'active' : ''}"><a class="page-link" onclick="quotesPage(${p})">${p}</a></li>`;
        }).join('')}
        <li class="page-item ${currentPage >= totalPages ? 'disabled' : ''}"><a class="page-link" onclick="quotesPage(${currentPage+1})">下一页</a></li>

  el.innerHTML = `

      <h5 class="fw-bold mb-0">报价单</h5>
      <div class="d-flex align-items-center gap-2">

          <option value="10" ${quotesPerPage===10?'selected':''}>10条/页</option>
          <option value="20" ${quotesPerPage===20?'selected':''}>20条/页</option>
          <option value="50" ${quotesPerPage===50?'selected':''}>50条/页</option>
        </select>
        <button class="btn btn-primary btn-modern" onclick="switchTab('newquote')"><i class="bi bi-plus-lg"></i> 新建报价</button>
      </div>
    </div>
    <div class="card-modern">
      <div class="table-responsive">
        <table class="table table-modern">
          <thead>
            <tr>
              <th style="width:50px">#</th>
              <th>标题</th>
              <th>客户</th>
              <th>日期</th>
              <th>状态</th>
              <th>总金额</th>
              <th style="width:130px">操作</th>
            </tr>
          </thead>
          <tbody>${pageQuotes.length ? pageQuotes.map(q => `
            <tr>
              <td class="text-muted">${q.id}</td>
              <td><strong style="font-size:.85rem">${escHtml(q.title || '未命名')}</strong></td>
              <td style="font-size:.82rem">${escHtml(q.client || '-')}</td>
              <td class="text-muted" style="font-size:.8rem">${q.quote_date || '-'}</td>
              <td><span class="badge" style="font-weight:500;font-size:.75rem;background:${q.status==='sent'?'#d1fae5':q.status==='confirmed'?'#dbeafe':'#f1f5f9'};color:${q.status==='sent'?'#059669':q.status==='confirmed'?'#2563eb':'#64748b'}">${q.status==='draft'?'草稿':q.status==='sent'?'已发送':q.status==='confirmed'?'已确认':q.status}</span></td>
              <td class="fw-medium" style="color:var(--danger);font-size:.87rem">${formatMoney(q.total_amount)}</td>

                <button class="btn btn-sm btn-modern btn-outline-info" onclick="previewQuote(${q.id})" title="预览输出格式"><i class="bi bi-file-earmark-pdf"></i></button>

async function downloadQuote(id) {
  try {
    // 先获取报价单信息用于文件名
    let filename = `报价单_${id}.xlsx`;
    try {
      const qd = await api(`/api/quotes/${id}`);
      if (qd.quote) {
        filename = `${qd.quote.client || ''}_${qd.quote.title || ''}_${qd.quote.contact || ''}_${(qd.quote.quote_date || '').replace(/-/g,'')}`.replace(/\s/g,'').replace(/_{2,}/g,'_').replace(/_$/,'').replace(/^_/,'') + '.xlsx';
      }
    } catch(_) {}
    const resp = await fetch(BASE_URL + `/api/quotes/${id}/export-excel`);
    const blob = await resp.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  } catch(e) {
    toast('下载失败', 'warning');
  }
}

    btn.innerHTML = '<i class="bi bi-download me-1"></i>下载Excel';

    footer.insertBefore(btn, footer.firstChild);
  }
}

      <td><input class="form-control form-control-sm" type="number" step="0.01" min="0" value="${item.unit_price}" onchange="quoteItems[${i}].unit_price=parseFloat(this.value)||0;recalcItem(${i});updateQuoteTotal()"></td>
      <td class="fw-medium" style="font-size:.87rem">${formatMoney(item.amount)}</td>
      <td><button class="btn btn-sm btn-modern btn-outline-danger border-0" onclick="removeQuoteItem(${i})"><i class="bi bi-x"></i></button></td>
    </tr>
  `).join('');
  updateQuoteTotal();
}

function recalcItem(i) {
  const item = quoteItems[i];
  item.amount = Math.round((item.quantity || 0) * (item.unit_price || 0) * 100) / 100;
  renderQuoteItems();
}
function updateQuoteTotal() {
  const total = quoteItems.reduce((s, item) => s + (item.amount || 0), 0);
  const el = $('quoteTotal');
  if (el) el.textContent = formatMoney(total);
}
function removeQuoteItem(i) { quoteItems.splice(i, 1); renderQuoteItems(); }

function showProductPicker() {
  window._pickerSelected = new Set();
  window._pickerCategory = '';
  // 优先从全局 categories，fallback 到 productsCache
  const cats = categories.length ? categories : (productsCache?.categories || []);
  const catChips = cats.slice(0, 12).map(c => `<button class="btn btn-sm btn-outline-secondary btn-modern picker-cat-btn" style="font-size:.75rem;padding:2px 10px" onclick="togglePickerCategory('${escHtml(c)}', this)">${escHtml(c)}</button>`).join('');
  const body = `
    <div class="mb-2" style="max-height:80px;overflow-y:auto">
      <div class="d-flex flex-wrap gap-1" id="pickerCatChips">${catChips}</div>
    </div>
    <div class="mb-2 d-flex gap-2">
      <input class="form-control search-box border" placeholder="搜索名称/规格/型号/功能/厂家..." oninput="filterProductPicker()" id="pickerSearch" style="flex:1">
      <button class="btn btn-sm btn-modern btn-outline-secondary" onclick="togglePickerAll()" id="pickerToggleAll">全选</button>
    </div>
    <div id="pickerResults" style="max-height:60vh;overflow-y:auto;"><div class="text-center py-4"><div class="spinner-border spinner-border-sm text-primary" role="status"></div><span class="text-muted small ms-2">正在加载产品数据...</span></div></div>
  `;
  showFormModal('选择产品（支持多选）', body, '添加选中', async () => {
    if (!window._pickerSelected || window._pickerSelected.size === 0) {
      toast('请至少选择一个产品', 'warning');
      return;
    }
    const added = [];
    for (const id of window._pickerSelected) {
      const p = window._pickerData[id];
      if (!p) continue;
      const existing = quoteItems.findIndex(item => item.product_id === p.id);
      if (existing >= 0) {
        quoteItems[existing].quantity = (quoteItems[existing].quantity || 0) + 1;
        quoteItems[existing].amount = Math.round(quoteItems[existing].quantity * quoteItems[existing].unit_price * 100) / 100;
      } else {
        quoteItems.push({product_id: p.id, product_name: p.name, product_sku: p.spec || '', product_spec: p.spec || '', product_unit: p.unit || '', quantity: 1, unit_price: p.price, amount: p.price, remark: '', _tmpId: Date.now() + Math.random()});
      }
      added.push(p.name);
    }
    renderQuoteItems();
    hideModal();
    toast(`已添加 ${added.length} 个产品`);
  }, '取消');
  // 先检查版本，有变化才重新全量加载
  (async () => {
    if (window._pickerLoaded && Object.keys(window._pickerData||{}).length) {
      try {
        const v = await api('/api/products/version');
        const ver = `${v.count}_${v.max_updated_at || ''}`;
        if (ver === window._pickerVersion) {
          renderPickerList(Object.values(window._pickerData));
          return;
        }
      } catch(e) { /* 版本检查失败则全量加载 */ }
    }
    loadProductPicker('');
  })();
}

async function loadProductPicker(search) {
  const el = $('pickerResults');
  if (el) el.innerHTML = '<div class="text-center py-4"><div class="spinner-border spinner-border-sm text-primary" role="status"></div><span class="text-muted small ms-2">正在加载产品数据...</span></div>';
  const data = await api(`/api/products?per_page=10000&search=${encodeURIComponent(search)}`);
  const list = data.products || [];
  // 更新全局 categories（供分类按钮用）
  if (data.categories?.length) { data.categories.forEach(c => { if (!categories.includes(c)) categories.push(c); }); }
  window._pickerData = {};
  list.forEach(p => window._pickerData[p.id] = p);
  window._pickerLoaded = true;
  if (data.version) window._pickerVersion = `${data.version.count}_${data.version.max_updated_at || ''}`;
  renderPickerList(list);
}

function renderPickerList(list) {
  const el = $('pickerResults');
  if (!el) return;
  if (!list.length) { el.innerHTML = '<div class="text-center text-muted py-4">没有匹配的产品</div>'; return; }
  el.innerHTML = list.map(p => {
    const checked = window._pickerSelected?.has(p.id) ? 'checked' : '';
    return `
    <div class="d-flex justify-content-between align-items-center p-2 picker-item" style="border-bottom:1px solid var(--gray-100)">
      <div class="d-flex align-items-center gap-2" style="flex:1">
        <input type="checkbox" class="form-check-input" value="${p.id}" ${checked} onchange="togglePickerItem(${p.id}, this.checked)" style="cursor:pointer">
        <div style="cursor:pointer" onclick="clickPickerName(${p.id}, this)">
          <strong style="font-size:.85rem">${escHtml(p.name)}</strong>${p.supplier ? ` <span class="badge bg-light text-muted" style="font-size:.65rem;font-weight:400">${escHtml(p.supplier)}</span>` : ''}${p.category ? ` <span class="badge bg-light text-muted" style="font-size:.65rem;font-weight:400">${escHtml(p.category)}</span>` : ''}
          <br><span class="text-muted" style="font-size:.75rem">${escHtml(p.spec||'')}</span>
        </div>
      </div>
      <div class="text-end">
        <span class="fw-medium">${formatMoney(p.price)}</span>
        <br><span class="text-muted" style="font-size:.72rem">/${escHtml(p.unit||'个')}</span>
      </div>
    </div>
    `;
  }).join('');
}

function togglePickerItem(id, checked) {
  if (!window._pickerSelected) window._pickerSelected = new Set();
  if (checked) window._pickerSelected.add(id);
  else window._pickerSelected.delete(id);
}

function clickPickerName(id, el) {
  const cb = el.parentElement.querySelector('input[type=checkbox]');
  cb.checked = !cb.checked;
  togglePickerItem(id, cb.checked);
}

function togglePickerAll() {
  if (!window._pickerData) return;
  const allIds = Object.keys(window._pickerData).map(Number);
  if (!window._pickerSelected) window._pickerSelected = new Set();
  const isAllChecked = allIds.every(id => window._pickerSelected.has(id));
  if (isAllChecked) {
    window._pickerSelected.clear();
  } else {
    allIds.forEach(id => window._pickerSelected.add(id));
  }
  // Re-render checkboxes
  const checkboxes = document.querySelectorAll('#pickerResults input[type="checkbox"]');
  checkboxes.forEach(cb => {
    cb.checked = !isAllChecked;
  });
  $('pickerToggleAll').textContent = isAllChecked ? '全选' : '取消全选';
}

function filterProductPicker() {
  clearTimeout(window._pp);
  window._pp = setTimeout(() => {
    const search = ($('pickerSearch')?.value || '').trim().toLowerCase();
    const cat = window._pickerCategory || '';
    const list = Object.values(window._pickerData).filter(p => {
      const matchSearch = !search || (p.name||'').toLowerCase().includes(search) || (p.spec||'').toLowerCase().includes(search) || (p.function_desc||'').toLowerCase().includes(search) || (p.supplier||'').toLowerCase().includes(search);
      const matchCat = !cat || (p.category||'').split(',').some(t => t.trim() === cat);
      return matchSearch && matchCat;
    });
    renderPickerList(list);
  }, 200);
}
function togglePickerCategory(cat, btn) {
  if (window._pickerCategory === cat) {
    window._pickerCategory = '';
    btn.classList.remove('active');
  } else {
    document.querySelectorAll('.picker-cat-btn').forEach(b => b.classList.remove('active'));
    window._pickerCategory = cat;
    btn.classList.add('active');
  }
  filterProductPicker();
}

function addProductToQuote(id, name, spec, unit, price) {
  const existing = quoteItems.findIndex(item => item.product_id === id);
  if (existing >= 0) {
    quoteItems[existing].quantity = (quoteItems[existing].quantity || 0) + 1;
    quoteItems[existing].amount = Math.round(quoteItems[existing].quantity * quoteItems[existing].unit_price * 100) / 100;
  } else {
    quoteItems.push({product_id: id, product_name: name, product_sku: spec, product_spec: spec, product_unit: unit, quantity: 1, unit_price: price, amount: price, remark: '', _tmpId: Date.now() + Math.random()});
  }
  renderQuoteItems();
  // 不关modal——支持连续单选或继续多选
  toast(`已添加「${name}」`);
}

function searchProductsForQuote(query) {
  const resultsDiv = $('searchResults');
  if (!resultsDiv) return;
  if (!query || query.length < 1) { resultsDiv.style.display = 'none'; return; }
  clearTimeout(window._sq);
  window._sq = setTimeout(async () => {
    const data = await api(`/api/products?per_page=10&search=${encodeURIComponent(query)}`);
    const list = data.products || [];
    if (!list.length) { resultsDiv.style.display = 'none'; return; }
    resultsDiv.style.display = 'block';
    resultsDiv.innerHTML = list.map(p =>
      `<div class="p-2 border-bottom" style="cursor:pointer" onclick="addProductToQuote(${p.id}, '${escHtml(p.name)}', '${escHtml(p.spec)}', '${escHtml(p.unit)}', ${p.price||0}); $('prodSearch').value=''; $('searchResults').style.display='none'">
        <strong style="font-size:.85rem">${escHtml(p.name)}</strong> <span class="text-muted small">${escHtml(p.spec||'')}</span>
        <span class="float-end text-primary fw-medium">${formatMoney(p.price)}</span>
      </div>`
    ).join('');
  }, 200);
}

document.addEventListener('click', function(e) {
  const r = $('searchResults');
  if (r && !e.target.closest('#prodSearch') && !e.target.closest('#searchResults')) r.style.display = 'none';
});

async function saveQuote() {
  const title = ($('qf_title')?.value || '').trim();
  const client = ($('qf_client')?.value || '').trim();
  const contact = ($('qf_contact')?.value || '').trim();
  const phone = ($('qf_phone')?.value || '').trim();
  const quote_date = ($('qf_date')?.value || new Date().toISOString().slice(0,10)).trim();
  const valid_days = parseInt($('qf_valid')?.value) || 15;
  const remark = ($('qf_remark')?.value || '').trim();
  if (!quoteItems.length) { toast('请至少添加一个产品', 'warning'); return; }
  const payload = {title, client, contact, phone, quote_date, valid_days, remark, items: quoteItems.map(item => ({product_id: item.product_id||null, product_name: item.product_name, product_sku: item.product_sku||'', product_spec: item.product_spec||'', product_unit: item.product_unit||'', quantity: item.quantity, unit_price: item.unit_price, remark: item.remark||''}))};
  try {
    if (editingQuoteId) { await api(`/api/quotes/${editingQuoteId}`, 'PUT', payload); toast('报价单已更新'); }
    else {
      const r = await api('/api/quotes', 'POST', payload);
      if (r.quote?.id) editingQuoteId = r.quote.id;
      toast('报价单已创建');
    }
    clearCaches();
    switchTab('quotes');
  } catch(e) { toast('保存失败: ' + e.message, 'warning'); }
}

// ─── Import ─────────────────────────────────────────────
function renderImport(el) {
  el.innerHTML = `
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h5 class="fw-bold mb-0"><i class="bi bi-upload me-2"></i>从Excel导入产品</h5>
    </div>
    <div class="row g-3">
      <div class="col-md-7">
        <div class="card-modern">
          <div class="card-title-modern"><i class="bi bi-file-earmark-excel text-success"></i>上传Excel文件</div>
          <div class="mb-3">
            <p class="text-muted small mb-1"><i class="bi bi-check-circle me-1 text-success"></i> 支持 <strong>多Sheet</strong> 导入，每张Sheet自动成为产品厂商</p>
            <p class="text-muted small">支持的字段：产品名称、规格型号、功能描述、单位、销售单价、成本价、供应商、备注</p>
            <p class="text-muted small">表头名称自动识别，支持多种格式。</p>
          </div>
          <div class="mb-3">
            <input class="form-control" type="file" id="importFile" accept=".xlsx,.xls">
          </div>
          <div class="d-flex gap-2">
            <button class="btn btn-primary btn-modern" onclick="doImport()"><i class="bi bi-upload me-1"></i> 开始导入</button>
            <button class="btn btn-outline-secondary btn-modern" onclick="window.open(BASE_URL + '/api/products/export-template')"><i class="bi bi-download me-1"></i> 下载原始模板</button>
          </div>
          <div id="importResult" class="mt-3"></div>
        </div>
      </div>
      <div class="col-md-5">
        <div class="card-modern">
          <div class="card-title-modern"><i class="bi bi-info-circle text-primary"></i>导入说明</div>
          <ul class="small text-muted mb-0" style="line-height:1.8">
            <li><strong>多Sheet支持</strong> — 所有Sheet自动导入</li>
            <li>每张Sheet名称自动设为<b>厂商</b></li>
            <li>支持 <code>.xlsx</code> / <code>.xls</code> 格式</li>
            <li>表头名称智能匹配，无需特定顺序</li>
            <li>自动跳过空行、「小计/合计」行</li>
            <li>当前已有 ${$('#mainContent') ? '...' : '0'} 个产品</li>
          </ul>
        </div>
      </div>
    </div>
  `;
}

async function doImport() {
  const fileInput = $('importFile');
  if (!fileInput.files.length) { toast('请选择文件', 'warning'); return; }
  const formData = new FormData();
  formData.append('file', fileInput.files[0]);
  const el = $('importResult');
  el.innerHTML = '<div class="text-center py-3"><div class="spinner-border text-primary" role="status"></div><p class="mt-2 small text-muted">正在导入所有Sheet...</p></div>';
  try {
    const r = await fetch(BASE_URL + '/api/products/import', { method: 'POST', body: formData });
    const result = await r.json();
    if (result.error) {
      el.innerHTML = `<div class="alert alert-danger py-2 small">${result.error}</div>`;
      toast('导入失败', 'warning');
    } else {
      el.innerHTML = `
      <div class="alert alert-success py-2 small">
        <i class="bi bi-check-circle me-1"></i> 成功导入 <strong>${result.imported}</strong> 个产品
        ${result.errors?.length ? `<hr class="my-1"><p class="mb-0" style="font-size:.78rem;max-height:120px;overflow-y:auto">${result.errors.slice(0, 10).map(e => `• ${escHtml(e)}`).join('<br>')}${result.errors.length > 10 ? `<br>...还有 ${result.errors.length - 10} 个错误` : ''}</p>` : ''}
      </div>
    `;
      toast(`成功导入 ${result.imported} 个产品`);
      clearCaches();
      renderProducts($('mainContent'));
    }
  } catch (err) {
    el.innerHTML = `<div class="alert alert-danger py-2 small">网络错误或超时，请重试。</div>`;
    toast('上传失败，文件可能过大或网络中断', 'warning');
  }
}

// ─── Modal Helper ──────────────────────────────────────
let modalFormCallback = null;

function showFormModal(title, body, btnText, callback, closeText, wide) {
  $('formModalTitle').textContent = title;
  $('formModalBody').innerHTML = body;
  const dialog = document.querySelector('#formModal .modal-dialog');
  if (dialog) dialog.style.maxWidth = wide ? '85vw' : '';
  const footer = $('formModalFooter');
  modalFormCallback = callback;
  if (btnText && callback) {
    footer.innerHTML = `<button class="btn btn-primary btn-modern" onclick="modalFormCallback()">${btnText}</button><button class="btn btn-secondary btn-modern" data-bs-dismiss="modal">${closeText || '取消'}</button>`;
  } else {
    footer.innerHTML = `<button class="btn btn-secondary btn-modern" data-bs-dismiss="modal">${closeText || '关闭'}</button>`;
  }
  bootstrap.Modal.getOrCreateInstance($('formModal')).show();
}

function hideModal() { bootstrap.Modal.getInstance($('formModal'))?.hide(); }

function viewImage(src, name) {
  showFormModal(name || '产品图片', `
    <div class="text-center">
      <img src="${src}" style="max-width:100%;max-height:75vh;object-fit:contain;border-radius:8px">
    </div>
  `, '', null, '关闭');
}

// ─── 即时悬浮 tooltip 定位 ───
document.addEventListener('mouseover', e => {
  const cell = e.target.closest('.tip-cell');
  if (!cell) return;
  const pop = cell.querySelector('.tip-pop');
  if (!pop) return;
  const onMove = (ev) => {
    const gap = 50;
    let left = ev.clientX + gap;
    let top = ev.clientY - 10;
    const rect = pop.getBoundingClientRect();
    // 右边界溢出 → 翻到左边
    if (left + pop.offsetWidth > window.innerWidth - gap) {
      left = ev.clientX - pop.offsetWidth - gap;
    }
    // 下边界溢出 → 上移
    if (top + pop.offsetHeight > window.innerHeight - gap) {
      top = window.innerHeight - pop.offsetHeight - gap;
    }
    if (top < gap) top = gap;
    pop.style.left = left + 'px';
    pop.style.top = top + 'px';
    pop.classList.add('show');
  };
  cell._tipMove = onMove;
  document.addEventListener('mousemove', onMove);
});
document.addEventListener('mouseout', e => {
  const cell = e.target.closest('.tip-cell');
  if (!cell) return;
  const pop = cell.querySelector('.tip-pop');
  if (pop) pop.classList.remove('show');
  if (cell._tipMove) {
    document.removeEventListener('mousemove', cell._tipMove);
    cell._tipMove = null;
  }
});

// ─── Auto-trim inputs on blur ──────────────────────────
document.addEventListener('blur', e => {
  const el = e.target;
  if ((el.tagName === 'INPUT' && (el.type === 'text' || el.type === 'search' || el.type === 'url' || !el.type)) || el.tagName === 'TEXTAREA') {
    el.value = el.value.trim();
  }
}, true);

// ─── Init ──────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  // Prefetch data for instant tab switch
  Promise.all([prefetchDashboard(), prefetchProducts()]).then(() => renderPage());
  // 加载版本号
  fetch(BASE_URL + '/api/version').then(r => r.json()).then(d => {
    const el = document.getElementById('versionDisplay');
    if (el && d.version) el.textContent = 'v' + d.version;
  }).catch(() => {});
});
