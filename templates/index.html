<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>报价管理系统</title>
<link href="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.bootcdn.net/ajax/libs/bootstrap-icons/1.11.2/font/bootstrap-icons.css" rel="stylesheet">
<script src="https://cdn.bootcdn.net/ajax/libs/twitter-bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
<style>
:root {
  --primary: #4f46e5;
  --primary-dark: #3730a3;
  --primary-light: #e0e7ff;
  --success: #059669;
  --danger: #dc2626;
  --warning: #d97706;
  --gray-50: #f8fafc;
  --gray-100: #f1f5f9;
  --gray-200: #e2e8f0;
  --gray-300: #cbd5e1;
  --gray-400: #94a3b8;
  --gray-500: #64748b;
  --gray-600: #475569;
  --gray-700: #334155;
  --gray-800: #1e293b;
  --gray-900: #0f172a;
  --sidebar-width: 240px;
}

* { box-sizing: border-box; }

body {
  background: var(--gray-50);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", Roboto, sans-serif;
  color: var(--gray-800);
  overflow-x: hidden;
}

/* ── Sidebar ── */
.sidebar {
  position: fixed; top: 0; left: 0; bottom: 0; width: var(--sidebar-width);
  background: linear-gradient(180deg, #1e1b4b 0%, #312e81 40%, #3730a3 100%);
  z-index: 1040;
  transition: transform .3s ease;
  display: flex; flex-direction: column;
  box-shadow: 2px 0 20px rgba(0,0,0,.08);
}
.sidebar-logo {
  padding: 1.2rem 1.25rem;
  border-bottom: 1px solid rgba(255,255,255,.08);
}
.sidebar-logo h5 {
  color: #fff; font-weight: 700; font-size: 1.1rem;
  margin: 0;
}
.sidebar-logo small {
  color: rgba(255,255,255,.5); font-size: .7rem;
}
.sidebar-nav {
  flex: 1; overflow-y: auto; padding: .5rem;
}
.sidebar-nav .nav-link {
  display: flex; align-items: center; gap: .6rem;
  color: rgba(255,255,255,.65);
  padding: .55rem .85rem;
  margin: 2px 0;
  border-radius: 8px;
  transition: all .2s;
  font-size: .88rem;
  text-decoration: none;
  cursor: pointer;
}
.sidebar-nav .nav-link:hover {
  color: #fff;
  background: rgba(255,255,255,.1);
}
.sidebar-nav .nav-link.active {
  color: #fff;
  background: rgba(255,255,255,.15);
  box-shadow: 0 0 0 1px rgba(255,255,255,.08);
}
.sidebar-nav .nav-link i {
  width: 18px; text-align: center;
  font-size: 1rem;
}
.sidebar-nav .nav-link .badge {
  margin-left: auto; font-size: .7rem;
  background: rgba(255,255,255,.15); color: #fff;
  font-weight: 500;
}

/* ── Sidebar Collapse ── */
.sidebar-collapse-btn {
  position: absolute;
  top: .7rem; right: .7rem;
  color: rgba(255,255,255,.5);
  background: none; border: none;
  font-size: 1rem; cursor: pointer;
  padding: 4px 6px; border-radius: 6px;
  transition: all .2s;
  z-index: 1;
}
.sidebar-collapse-btn:hover { color: #fff; background: rgba(255,255,255,.1); }
.sidebar.collapsed {
  width: 60px !important;
}
.sidebar.collapsed .sidebar-logo {
  padding: .8rem .5rem;
  text-align: center;
}
.sidebar.collapsed .sidebar-logo h5 { font-size: 0; }
.sidebar.collapsed .sidebar-logo h5 i { font-size: 1.2rem; }
.sidebar.collapsed .sidebar-logo small { display: none; }
.sidebar.collapsed .sidebar-nav .nav-link {
  justify-content: center;
  padding: .55rem;
  font-size: 0;
}
.sidebar.collapsed .sidebar-nav .nav-link i { font-size: 1.1rem; margin: 0; }
.sidebar.collapsed .sidebar-nav .nav-link .badge { display: none; }
.sidebar.collapsed hr { display: none; }
.main-wrapper.expanded { margin-left: 60px; }
.main-wrapper {
  margin-left: var(--sidebar-width);
  min-height: 100vh;
  transition: margin-left .3s ease;
}
.topbar {
  background: #fff;
  border-bottom: 1px solid var(--gray-200);
  padding: .65rem 1.5rem;
  position: sticky; top: 0; z-index: 1030;
  display: flex; align-items: center;
}
.topbar-title { font-weight: 600; font-size: 1rem; color: var(--gray-800); }
.main-content { padding: 1.5rem; }

/* ── Cards ── */
.card-modern {
  background: #fff;
  border: 1px solid var(--gray-200);
  border-radius: 12px;
  padding: 1.25rem;
  margin-bottom: 1rem;
  transition: box-shadow .2s;
}
.card-modern:hover {
  box-shadow: 0 4px 12px rgba(0,0,0,.04);
}
.card-title-modern {
  font-size: .9rem;
  font-weight: 600;
  color: var(--gray-700);
  margin-bottom: .9rem;
  display: flex;
  align-items: center;
  gap: .5rem;
}

/* ── Stat Cards ── */
.stat-card {
  background: #fff;
  border: 1px solid var(--gray-200);
  border-radius: 12px;
  padding: 1.25rem;
  transition: transform .15s, box-shadow .15s;
}
.stat-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 6px 16px rgba(0,0,0,.06);
}
.stat-icon {
  width: 44px; height: 44px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.3rem;
  flex-shrink: 0;
}

/* ── Table ── */
.table-modern { margin-bottom: 0; }
.table-modern > :not(caption) > * > * {
  vertical-align: middle;
  padding: .6rem .5rem;
  border-bottom: 1px solid var(--gray-100);
}
.table-modern > thead > tr > * {
  background: var(--gray-50);
  font-size: .78rem;
  font-weight: 600;
  color: var(--gray-500);
  text-transform: uppercase;
  letter-spacing: .03em;
  border-bottom: 1px solid var(--gray-200);
}
.table-modern > tbody > tr:hover {
  background: var(--gray-50);
}

/* ── Search ── */
.search-box {
  background: var(--gray-100);
  border: 1px solid var(--gray-200);
  border-radius: 8px;
  padding: .4rem .75rem;
  transition: all .2s;
}
.search-box:focus {
  background: #fff;
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(79,70,229,.1);
}

/* ── Buttons ── */
.btn-modern {
  border-radius: 8px;
  font-weight: 500;
  padding: .4rem .9rem;
  font-size: .85rem;
  transition: all .15s;
}
.btn-sm-icon { padding: .25rem .5rem; }

/* ── Pagination ── */
.pagination-modern .page-link {
  border: none;
  border-radius: 6px !important;
  margin: 0 2px;
  font-size: .82rem;
  color: var(--gray-600);
  padding: .3rem .65rem;
  background: transparent;
}
.pagination-modern .page-link:hover {
  background: var(--gray-100);
}
.pagination-modern .page-item.active .page-link {
  background: var(--primary);
  color: #fff;
}

/* ── Sidebar Overlay ── */
.sidebar-overlay {
  display: none;
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,.4);
  z-index: 1035;
}

/* ── Toast ── */
.toast-container { z-index: 9999; }

/* ── Animations ── */
@keyframes fadeSlideUp {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.anim-in { animation: fadeSlideUp .25s ease both; }

/* ── Empty State ── */
.empty-state {
  text-align: center; padding: 2.5rem 1rem;
  color: var(--gray-400);
}
.empty-state i { font-size: 2.5rem; margin-bottom: .8rem; }

/* ── Misc ── */
.amount-total { font-size: 1rem; font-weight: 600; color: var(--danger); }
.picker-item:hover { background: var(--primary-light); }
.search-results {
  position: absolute; z-index: 100;
  background: #fff; border: 1px solid var(--gray-200);
  border-radius: 8px; margin-top: 4px;
  max-height: 300px; overflow-y: auto;
  box-shadow: 0 8px 24px rgba(0,0,0,.1);
}

/* ── Responsive ── */
@media (max-width: 991.98px) {
  .sidebar { transform: translateX(-100%); }
  .sidebar.open { transform: translateX(0); }
  .sidebar-overlay.show { display: block; }
  .main-wrapper { margin-left: 0; }
  .main-content { padding: 1rem; }
}
@media (min-width: 992px) {
  .sidebar-toggle { display: none !important; }
}

/* ── Form Tweaks ── */
.form-control:focus, .form-select:focus {
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(79,70,229,.1);
}
.modern-modal .modal-content {
  border: none;
  border-radius: 14px;
  box-shadow: 0 20px 60px rgba(0,0,0,.15);
  overflow: hidden;
}
.modern-modal .modal-dialog {
  max-width: 60vw !important;
  min-width: 360px;
}

/* ── 即时悬浮 tooltip ── */
.tip-cell {
  position: relative;
  cursor: default;
}
.tip-pop {
  display: none;
  position: fixed;
  background: #1e293b;
  color: #fff;
  padding: 8px 12px;
  border-radius: 8px;
  font-size: .78rem;
  line-height: 1.5;
  white-space: pre-line;
  z-index: 9999;
  min-width: 200px;
  max-width: 360px;
  pointer-events: none;
  box-shadow: 0 4px 16px rgba(0,0,0,.25);
}
.tip-pop.show {
  display: block;
}
.autocomplete-wrap { position: relative; }
.autocomplete-dropdown {
  display: none;
  position: absolute;
  top: 100%; left: 0; right: 0;
  max-height: 180px;
  overflow-y: auto;
  background: #fff;
  border: 1px solid var(--gray-200);
  border-radius: 0 0 8px 8px;
  box-shadow: 0 4px 12px rgba(0,0,0,.1);
  z-index: 1050;
}
.autocomplete-dropdown.show { display: block; }
.autocomplete-dropdown .ac-item {
  padding: 6px 12px;
  cursor: pointer;
  font-size: .85rem;
  color: #333;
}
.autocomplete-dropdown .ac-item:hover,
.autocomplete-dropdown .ac-item.active {
  background: var(--primary-light);
  color: var(--primary);
}
.modern-modal .modal-header {
  border-bottom: 1px solid var(--gray-100);
  padding: 1rem 1.25rem;
}
.modern-modal .modal-body { padding: 1.25rem; }
.modern-modal .modal-footer {
  border-top: 1px solid var(--gray-100);
  padding: .75rem 1.25rem;
}

/* per-page selector */
.per-page-select {
  width: auto;
  display: inline-block;
  font-size: .82rem;
  padding: .2rem .5rem;
  border-radius: 6px;
  border: 1px solid var(--gray-200);
  background: #fff;
  color: var(--gray-600);
}
/* Switch toggle for admin panel */
.switch { position:relative; display:inline-block; width:44px; height:24px; margin:0 }
.switch input { opacity:0; width:0; height:0 }
.slider { position:absolute; cursor:pointer; top:0;left:0;right:0;bottom:0; background-color:var(--gray-300); transition:.3s; border-radius:24px }
.slider:before { position:absolute; content:""; height:18px; width:18px; left:3px; bottom:3px; background-color:#fff; transition:.3s; border-radius:50% }
input:checked+.slider { background-color:var(--primary) }
input:checked+.slider:before { transform:translateX(20px) }
</style>
</head>
<body>

<!-- Toast -->
<div class="toast-container position-fixed bottom-0 end-0 p-3">
  <div id="liveToast" class="toast border-0 shadow" role="alert">
    <div class="toast-header bg-light bg-opacity-75">
      <i class="bi bi-check-circle-fill text-success me-2"></i>
      <strong class="me-auto">提示</strong>
      <button type="button" class="btn-close" data-bs-dismiss="toast"></button>
    </div>
    <div class="toast-body" id="toastBody"></div>
  </div>
</div>

<!-- Sidebar Overlay (mobile) -->
<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

<!-- Sidebar -->
<div class="sidebar" id="sidebar">
  <div class="sidebar-logo" style="position:relative">
    <h5><i class="bi bi-file-text me-2"></i>报价系统</h5>
    <small>硬件报价管理平台</small>
    <button class="sidebar-collapse-btn d-none d-lg-block" onclick="toggleCollapse()" title="收起菜单"><i class="bi bi-chevron-left"></i></button>
  </div>
  <div class="sidebar-nav">
    <a class="nav-link active" onclick="switchTab('dashboard')">
      <i class="bi bi-speedometer2"></i> 概览
    </a>
    <a class="nav-link" onclick="switchTab('products')">
      <i class="bi bi-box-seam"></i> 产品管理
    </a>
    <a class="nav-link" onclick="switchTab('quotes')">
      <i class="bi bi-file-earmark-text"></i> 报价单
    </a>
    <a class="nav-link" onclick="switchTab('newquote')">
      <i class="bi bi-plus-circle"></i> 新建报价
      <span class="badge">+</span>
    </a>
    <a class="nav-link" onclick="switchTab('import')">
      <i class="bi bi-upload"></i> 导入产品
    </a>
    <a class="nav-link admin-only" onclick="switchTab('admin')" style="display:none">
      <i class="bi bi-gear"></i> 管理
    </a>
    <hr style="border-color: rgba(255,255,255,.08); margin: .5rem 0;">
    <a class="nav-link" style="opacity:.6; font-size:.8rem; cursor:default">
      <i class="bi bi-info-circle"></i> <span id="versionDisplay">v—</span>
    </a>
  </div>
</div>

<!-- Main Wrapper -->
<div class="main-wrapper" id="mainWrapper">
  <div class="topbar">
    <button class="btn btn-link sidebar-toggle text-dark me-2 p-0" onclick="toggleSidebar()" style="font-size:1.2rem;text-decoration:none">
      <i class="bi bi-list"></i>
    </button>
    <span class="topbar-title" id="topbarTitle">概览</span>
    <div style="margin-left:auto;display:flex;align-items:center;gap:.5rem">
      <div class="dropdown" style="display:none" id="userDropdown">
        <button class="btn btn-sm btn-outline-secondary dropdown-toggle" type="button" data-bs-toggle="dropdown" style="font-size:.75rem">
          <span id="topbarUser">用户</span>
        </button>
        <ul class="dropdown-menu dropdown-menu-end" style="font-size:.82rem;min-width:140px">
          <li><a class="dropdown-item" href="#" onclick="showProfileModal()"><i class="bi bi-person-gear me-2"></i>个人信息</a></li>
          <li><hr class="dropdown-divider" style="margin:.25rem 0"></li>
          <li><a class="dropdown-item text-danger" href="#" onclick="logout()"><i class="bi bi-box-arrow-right me-2"></i>退出</a></li>
        </ul>
      </div>
    </div>
  </div>
  <div class="main-content" id="mainContent">
    <!-- Pages rendered by JS -->
  </div>
</div>

<!-- Modal -->
<div class="modal fade modern-modal" id="formModal" tabindex="-1">
  <div class="modal-dialog modal-lg modal-dialog-centered modal-dialog-scrollable">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title fw-semibold" id="formModalTitle"></h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body" id="formModalBody"></div>
      <div class="modal-footer" id="formModalFooter"></div>
    </div>
  </div>
</div>

<script src="static/js/app.js"></script>
<script src="static/js/auth.js"></script>
<script src="static/js/products.js"></script>
</body>
</html>
