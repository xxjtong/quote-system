name: API Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install flask flask-sqlalchemy flask-cors gunicorn openpyxl pypinyin pyjwt Pillow
          pip install pytest requests

      - name: Start application
        run: |
          export QUOTE_JWT_SECRET="test-secret-ci-$(openssl rand -hex 16)"
          export QUOTE_ADMIN_PASSWORD="admin123"
          mkdir -p uploads/images exports
          python -c "
          from app import app, db
          with app.app_context():
              db.create_all()
          "
          python app.py &
          sleep 3
          curl -f http://127.0.0.1:5000/api/version

      - name: Run tests
        run: |
          python -m pytest tests/test_auth.py tests/test_products.py tests/test_quotes.py tests/test_admin.py tests/test_edge_cases.py tests/test_comprehensive.py -v --tb=short --junitxml=test-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.xml
